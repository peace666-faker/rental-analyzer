<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛫 空运工作台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;text-align:center}
.card{background:rgba(255,255,255,0.08);border-radius:24px;padding:40px 28px;max-width:360px;width:90%;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12)}
.icon{font-size:80px;margin-bottom:16px;animation:fly 2s ease-in-out infinite}
@keyframes fly{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
h1{font-size:24px;margin-bottom:6px;letter-spacing:1px}
.subtitle{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:28px}
.btn{display:block;background:linear-gradient(135deg,#4f8cff,#2563eb);color:#fff;padding:16px 0;border-radius:14px;font-size:18px;font-weight:700;text-decoration:none;margin-bottom:20px;box-shadow:0 4px 20px rgba(37,99,235,0.4);transition:all 0.2s}
.btn:active{transform:scale(0.96);opacity:0.9}
.steps{font-size:11px;color:rgba(255,255,255,0.4);line-height:2;margin-top:16px;border-top:1px solid rgba(255,255,255,0.08);padding-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🛫</div>
  <h1>空运工作台</h1>
  <p class="subtitle">空运出口 · 一票到底</p>
  <a class="btn" href="https://github.com/peace666-faker/rental-analyzer/raw/master/air-export.apk">📥 下载安装</a>
  <div class="steps">
    下载后点通知栏 → 点安装<br>
    如提示"未知来源" → 允许本次安装<br>
    装完桌面出现 🛫 图标
  </div>
</div>
</body>
</html>
