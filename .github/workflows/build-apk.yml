name: Build APK

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build debug APK
        id: build
        run: |
          cd android
          gradle assembleDebug --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      - name: Show output tree
        run: |
          echo "=== APK outputs ==="
          find android -name "*.apk" 2>/dev/null || echo "no APK found"
          echo "=== build output dirs ==="
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "no apk dir"
          ls -la android/app/build/outputs/ 2>/dev/null || echo "no outputs dir"
          ls -la android/app/build/ 2>/dev/null || echo "no build dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: air-export-apk
          path: android/app/build/outputs/apk/**/*.apk

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: android/build.log
